version: 1
on_parse_failure: block          # block | allow — what to do when the request body can't be parsed
entropy:
  min_length: 20
  threshold: 4.0
presidio:
  enabled: false
injection:
  enabled: true
  mode: shadow                   # shadow = log-and-allow (default) | enforce = block at threshold
  block_threshold: 0.8
  judge_enabled: false           # Tier-2 seam — inert in v1 (PLAN-injection.md §16)
  judge_band: [0.3, 0.7]
rules:                           # first match wins, by finding category
  - {category: secret, action: block}
  - {category: pii,    action: redact}
  - {category: injection, action: block}   # consulted only in enforce mode at/above block_threshold
default_action: allow
routing:                         # `when` values are exactly Decision.action values
  - {when: redact, model: claude-haiku-4-5-20251001}   # sensitive -> cheap model
