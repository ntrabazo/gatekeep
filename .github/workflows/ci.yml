name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  harness:
    name: Red-team harness (Python, offline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run offline red-team harness (exit 0 = 100% catch, 0 false positives)
        run: python harness/run_harness.py

  parity:
    name: JS/Python parity (demo port)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Verify the JS port matches the Python engine on the full corpus
        run: node demo/parity.test.js
